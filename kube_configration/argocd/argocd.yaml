---
- name: Install ArgoCD Helm Chart
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../../vars.yaml

  tasks:
    - name: Create namespace
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ vars.all.vars.argocd.namespace }}"
        state: present

    - name: Add ArgoCD Helm repository
      kubernetes.core.helm_repository:
        name: argo
        repo_url: https://argoproj.github.io/argo-helm

    - name: Install ArgoCD
      kubernetes.core.helm:
        name: argocd
        chart_ref: argo/argo-cd
        namespace: "{{ vars.all.vars.argocd.namespace }}"
        state: present
        update_repo_cache: true
        wait: true
        values:
          server:
            service:
              type: LoadBalancer
              loadBalancerIP: "{{ vars.all.vars.argocd.loadBalancerIP }}"
            ingress:
              enabled: false
          configs:
            credentialTemplates:
              github-pat:
                url: https://github.com/singularis
                username: "singularis314"
                password: "{{ vars.all.vars.argocd.github_token }}"
